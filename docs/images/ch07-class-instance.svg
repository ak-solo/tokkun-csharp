<svg xmlns="http://www.w3.org/2000/svg" width="480" height="150" viewBox="0 0 480 150">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>
  <text x="75" y="18" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="12" fill="#555">クラス（設計図）</text>
  <text x="333" y="18" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="12" fill="#555">インスタンス（実体）</text>
  <rect x="15" y="30" width="120" height="105" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <line x1="15" y1="58" x2="135" y2="58" stroke="#d6b656" stroke-width="1"/>
  <text x="75" y="44" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Dog</text>
  <text x="75" y="74" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#555">name</text>
  <text x="75" y="93" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#555">age</text>
  <line x1="136" y1="83" x2="203" y2="83" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="170" y="73" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#333">new</text>
  <rect x="205" y="30" width="120" height="105" rx="4" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <line x1="205" y1="58" x2="325" y2="58" stroke="#6c8ebf" stroke-width="1"/>
  <text x="265" y="44" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">pochi</text>
  <text x="265" y="74" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#555">name = ポチ</text>
  <text x="265" y="93" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#555">age = 3</text>
  <rect x="340" y="30" width="120" height="105" rx="4" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <line x1="340" y1="58" x2="460" y2="58" stroke="#6c8ebf" stroke-width="1"/>
  <text x="400" y="44" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">koro</text>
  <text x="400" y="74" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#555">name = コロ</text>
  <text x="400" y="93" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#555">age = 5</text>
